{% extends "base.html" %}

{% block title %}Eliminar Tarea — TaskManager{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">

    <div class="card border-danger">
      <div class="card-header bg-danger text-white">
        <h5 class="mb-0"><i class="bi bi-exclamation-triangle me-2"></i>Confirmar eliminación</h5>
      </div>
      <div class="card-body text-center py-4">
        <i class="bi bi-trash text-danger" style="font-size: 3rem;"></i>
        <h4 class="mt-3">¿Eliminar tarea?</h4>
        <p class="text-muted">
          <strong>"{{ task.title }}"</strong><br>
          Esta acción <strong>no se puede deshacer</strong>.
        </p>
        <form method="post" class="d-inline">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger me-2">
            <i class="bi bi-trash me-1"></i>Sí, eliminar
          </button>
        </form>
        <a href="{% url 'projects:project_detail' task.project.pk %}"
           class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </div>

  </div>
</div>
{% endblock %}
