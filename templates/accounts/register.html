{% extends "base.html" %}

{% block title %}Registrarse — TaskManager{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">

    <div class="card mt-4">
      <div class="card-header bg-primary text-white text-center py-3">
        <h4 class="mb-0"><i class="bi bi-person-plus me-2"></i>Crear cuenta</h4>
      </div>

      <div class="card-body p-4">
        <!--
          El atributo {% csrf_token %} genera un token oculto que protege
          el formulario contra ataques CSRF (Cross-Site Request Forgery).
          Django lo verifica automáticamente en cada POST.
        -->
        <form method="post" novalidate>
          {% csrf_token %}

          {% for field in form %}
          <div class="mb-3">
            <label for="{{ field.id_for_label }}" class="form-label fw-semibold">
              {{ field.label }}
            </label>
            {{ field }}
            <!-- Errores de validación del campo -->
            {% for error in field.errors %}
              <div class="text-danger small mt-1">
                <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
              </div>
            {% endfor %}
          </div>
          {% endfor %}

          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="bi bi-check-circle me-2"></i>Crear cuenta
            </button>
          </div>
        </form>
      </div>

      <div class="card-footer text-center text-muted py-3">
        ¿Ya tienes cuenta?
        <a href="{% url 'accounts:login' %}" class="text-primary fw-semibold">
          Inicia sesión
        </a>
      </div>
    </div>

  </div>
</div>
{% endblock %}
